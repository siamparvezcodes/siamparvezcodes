name: Update README Stats Cards

on:
  schedule:
    - cron: "0 0 * * *"   # প্রতিদিন রাত ১২টায় (UTC) নিজে থেকে আপডেট হবে
  workflow_dispatch:        # চাইলে ম্যানুয়ালি "Run workflow" বাটনে ক্লিক করেও চালানো যাবে

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate GitHub Stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=siamparvezcodes&show_icons=true&hide_border=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Top Languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=siamparvezcodes&layout=compact&hide_border=true
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Trophy card
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: siamparvezcodes
          output_path: profile/trophy.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push generated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "chore: update README stats cards" || echo "No changes to commit"
          git push
